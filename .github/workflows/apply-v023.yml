name: Apply FrameJoin Studio 0.23

on:
  push:
    branches: [main]
    paths:
      - "sync/v0.23_payload.b64"
      - ".github/workflows/apply-v023.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-framejoin-v023
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Apply FrameJoin Studio 0.23 payload
        shell: bash
        run: |
          set -euo pipefail
          test -f sync/v0.23_payload.b64
          base64 --decode sync/v0.23_payload.b64 > /tmp/framejoin-v023.zip
          unzip -t /tmp/framejoin-v023.zip
          unzip -o /tmp/framejoin-v023.zip -d .

          python - <<'PY'
          from pathlib import Path

          for name in (
              ".github/workflows/build-installers.yml",
              ".github/workflows/publish-release.yml",
          ):
              path = Path(name)
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8")
              text = text.replace('APP_VERSION: "0.21"', 'APP_VERSION: "0.23"')
              text = text.replace('APP_VERSION: "0.22"', 'APP_VERSION: "0.23"')
              path.write_text(text, encoding="utf-8")
          PY

          python -m compileall -q framejoin tests scripts main.py sitecustomize.py
          rm -f sync/v0.23_payload.b64 .github/workflows/apply-v023.yml
          rmdir sync 2>/dev/null || true

      - name: Commit FrameJoin Studio 0.23
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No 0.23 changes to commit."
            exit 0
          fi
          git commit -m "Release FrameJoin Studio 0.23 UI, GPU diagnostics, and combined preview"
          git push origin HEAD:main
