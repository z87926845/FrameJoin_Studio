name: Validate FrameJoin Studio 0.25

on:
  push:
    branches: [v0.25-development]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-15, macos-15-intel]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      QT_QPA_PLATFORM: ${{ startsWith(matrix.os, 'windows') && 'offscreen' || 'minimal' }}
      FRAMEJOIN_SKIP_UI_SMOKE: ${{ startsWith(matrix.os, 'windows') && '0' || '1' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pillow
      - name: Compile all Python sources
        shell: bash
        run: python -m compileall -q framejoin tests scripts main.py sitecustomize.py
      - name: Verify fixed branding
        shell: bash
        run: python scripts/materialize_branding.py
      - name: Run non-FFmpeg unit tests
        shell: bash
        run: |
          python -m unittest tests.test_core.CoreTests.test_branding_hashes -v
          python -m unittest tests.test_core.CoreTests.test_bilingual_strings_without_gui -v
          python -m unittest tests.test_core.CoreTests.test_backend_resolution -v
          python -m unittest tests.test_core.CoreTests.test_encoder_capability_labels -v
          python -m unittest tests.test_core.CoreTests.test_mixed_media_is_blocked -v
          python -m unittest tests.test_core.CoreTests.test_sequence_frames_are_copied_in_list_order_with_continuous_names -v
          python -m unittest tests.test_core.CoreTests.test_video_transcode_accepts_mismatched_video_parameters -v
          python -m unittest tests.test_core.CoreTests.test_video_audio_copy_remains_guarded -v
      - name: Run Windows UI smoke tests
        if: startsWith(matrix.os, 'windows')
        shell: bash
        run: python -m unittest discover -s tests -p "test_ui_smoke.py" -v
