name: Prepare zero-based sequence defaults

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v0.25-zero-index
          fetch-depth: 0

      - name: Set zero-based six-digit defaults
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              "framejoin/models.py": [
                  ("sequence_frame_start: int = 1", "sequence_frame_start: int = 0"),
              ],
              "framejoin/ui_settings.py": [
                  ("self.frame_start_spin.setValue(1)", "self.frame_start_spin.setValue(0)"),
              ],
              "framejoin/i18n.py": [
                  (
                      '"frame_copy_note": "按素材列表顺序复制原始图像字节并连续编号；不会改名或覆盖源文件。输出目录必须为空。",',
                      '"frame_copy_note": "默认从 0 开始并使用 6 位编号（frame_000000）；按列表顺序复制原图字节，不改名或覆盖源文件。输出目录必须为空。",',
                  ),
                  (
                      '"frame_copy_note": "Copies original image bytes in list order and renumbers them continuously. Source files are never renamed or overwritten; the destination must be empty.",',
                      '"frame_copy_note": "Defaults to zero-based six-digit numbering (frame_000000). Copies original image bytes in list order without renaming or overwriting sources; the destination must be empty.",',
                  ),
              ],
              "README.md": [
                  ("默认示例：`frame_000001.png`、`frame_000002.png`……", "默认从 0 开始、使用 6 位编号：`frame_000000.png`、`frame_000001.png`……"),
                  ("Example: `frame_000001.png`, `frame_000002.png`, ...", "Defaults to zero-based six-digit numbering: `frame_000000.png`, `frame_000001.png`, ..."),
              ],
              "tests/test_core.py": [
                  (
                      "    def test_backend_resolution(self) -> None:\n",
                      "    def test_continuous_sequence_defaults_to_zero_with_six_digits(self) -> None:\n"
                      "        settings = JoinSettings()\n"
                      "        self.assertEqual(settings.sequence_frame_start, 0)\n"
                      "        self.assertEqual(settings.sequence_frame_digits, 6)\n\n"
                      "    def test_backend_resolution(self) -> None:\n",
                  ),
              ],
              "tests/test_ui_smoke.py": [
                  (
                      "        self.assertFalse(window.settings_panel.lossy_options.isEnabled())\n",
                      "        self.assertFalse(window.settings_panel.lossy_options.isEnabled())\n"
                      "        self.assertEqual(window.settings_panel.frame_start_spin.value(), 0)\n"
                      "        self.assertEqual(window.settings_panel.frame_digits_spin.value(), 6)\n",
                  ),
              ],
          }

          for filename, pairs in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              for old, new in pairs:
                  if old not in text:
                      raise SystemExit(f"Expected text not found in {filename}: {old!r}")
                  text = text.replace(old, new, 1)
              path.write_text(text, encoding="utf-8")

          Path(".github/workflows/apply-zero-index-default.yml").unlink(missing_ok=True)
          PY

      - name: Run focused tests
        shell: bash
        run: |
          python -m compileall -q framejoin tests
          python -m unittest tests.test_core.CoreTests.test_continuous_sequence_defaults_to_zero_with_six_digits -v

      - name: Commit prepared source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Default continuous sequences to frame zero with six-digit numbering"
          git push origin HEAD:v0.25-zero-index
