name: Apply FrameJoin Studio 0.23 from issue trigger

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: github.event.issue.title == 'Apply FrameJoin Studio 0.23 source payload'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Apply verified 0.23 source payload
        shell: bash
        run: |
          set -euo pipefail
          test -f sync/v0.23_payload.b64
          base64 --decode sync/v0.23_payload.b64 > /tmp/framejoin-v023.zip
          unzip -t /tmp/framejoin-v023.zip
          unzip -o /tmp/framejoin-v023.zip -d .

          python - <<'PY'
          from pathlib import Path

          replacements = {
              'APP_VERSION: "0.21"': 'APP_VERSION: "0.23"',
              'APP_VERSION: "0.22"': 'APP_VERSION: "0.23"',
          }
          for name in (
              '.github/workflows/build-installers.yml',
              '.github/workflows/publish-release.yml',
          ):
              path = Path(name)
              if not path.exists():
                  continue
              text = path.read_text(encoding='utf-8')
              for old, new in replacements.items():
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')
          PY

          python -m compileall -q framejoin tests scripts main.py sitecustomize.py
          rm -f sync/v0.23_payload.b64
          rm -f .github/workflows/apply-v023.yml
          rm -f .github/workflows/apply-v023-issue.yml
          rmdir sync 2>/dev/null || true

      - name: Commit the actual 0.23 source tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release FrameJoin Studio 0.23 UI, GPU diagnostics, and combined preview"
          git push origin HEAD:main

      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        shell: bash
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$GH_REPO" --body "FrameJoin Studio 0.23 source payload applied to main."
          gh issue close "$ISSUE_NUMBER" --repo "$GH_REPO" --reason completed