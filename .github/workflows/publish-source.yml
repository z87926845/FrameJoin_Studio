# This workflow expands the verified source archive into browsable repository files.
name: Expand source archive

on:
  push:
    paths:
      - "source_parts/**"
      - ".github/workflows/publish-source.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reassemble and verify source
        shell: bash
        run: |
          set -euo pipefail
          cat source_parts/FrameJoin_Studio_v0.19_Source.zip.part* > source.zip
          echo "907c9771b5ce0582dc8d83e35ca3cdb9dd176552ef343842a1f7392118f178b7  source.zip" | sha256sum -c -
          rm -rf .source_unpack
          unzip -q source.zip -d .source_unpack
          src=".source_unpack/FrameJoin_Studio_v0.19_Source"
          test -f "$src/main.py"
          test -f "$src/framejoin/ui.py"
          rm -rf framejoin
          cp -a "$src/framejoin" .
          cp "$src/main.py" "$src/sitecustomize.py" "$src/requirements.txt" "$src/THIRD_PARTY_NOTICES.txt" "$src/.gitignore" .
          rm -rf source_parts source.zip .source_unpack

      - name: Commit expanded source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Expand FrameJoin Studio 0.19 source [skip ci]"
          git push
