name: Publish Installers Release

on:
  workflow_run:
    workflows: ["Build Installers"]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    env:
      APP_VERSION: "0.21"
    steps:
      - name: Download artifacts from successful installer build
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p artifact-zips release
          gh api "repos/${REPOSITORY}/actions/runs/${RUN_ID}/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.expired == false) | [.id, .name] | @tsv' > artifacts.tsv
          test -s artifacts.tsv
          while IFS=$'\t' read -r artifact_id artifact_name; do
            zip_path="artifact-zips/${artifact_name}.zip"
            unpack_dir="artifact-zips/${artifact_name}"
            gh api "repos/${REPOSITORY}/actions/artifacts/${artifact_id}/zip" > "$zip_path"
            mkdir -p "$unpack_dir"
            unzip -q "$zip_path" -d "$unpack_dir"
            find "$unpack_dir" -type f -exec cp {} release/ \;
          done
          test -n "$(find release -maxdepth 1 -type f -print -quit)"
          ls -lah release

      - name: Create or update v0.21 release
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          tag="v${APP_VERSION}"
          title="FrameJoin Studio ${APP_VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release/* --clobber
            gh release edit "$tag" --title "$title"
          else
            gh release create "$tag" release/* \
              --target "$TARGET_SHA" \
              --title "$title" \
              --generate-notes
          fi
