name: Publish Installers Release

on:
  workflow_run:
    workflows: ["Build Installers"]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    env:
      APP_VERSION: "0.25"
    steps:
      - name: Download artifacts from successful installer build
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: downloaded-artifacts

      - name: Flatten and validate installer files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release
          while IFS= read -r -d '' source_file; do
            file_name="$(basename "$source_file")"
            destination="release/$file_name"
            if [[ -e "$destination" ]]; then
              echo "Duplicate release asset name: $file_name" >&2
              exit 1
            fi
            cp "$source_file" "$destination"
          done < <(find downloaded-artifacts -type f -print0)

          expected=(
            "FrameJoin_Studio_v${APP_VERSION}_Windows_x64_Portable.zip"
            "FrameJoin_Studio_v${APP_VERSION}_Windows_x64_Portable.zip.sha256.txt"
            "FrameJoin_Studio_v${APP_VERSION}_Windows_x64_Setup.exe"
            "FrameJoin_Studio_v${APP_VERSION}_Windows_x64_Setup.exe.sha256.txt"
            "FrameJoin_Studio_v${APP_VERSION}_macOS_arm64.dmg"
            "FrameJoin_Studio_v${APP_VERSION}_macOS_arm64.dmg.sha256.txt"
            "FrameJoin_Studio_v${APP_VERSION}_macOS_arm64.pkg"
            "FrameJoin_Studio_v${APP_VERSION}_macOS_arm64.pkg.sha256.txt"
            "FrameJoin_Studio_v${APP_VERSION}_macOS_Intel.dmg"
            "FrameJoin_Studio_v${APP_VERSION}_macOS_Intel.dmg.sha256.txt"
            "FrameJoin_Studio_v${APP_VERSION}_macOS_Intel.pkg"
            "FrameJoin_Studio_v${APP_VERSION}_macOS_Intel.pkg.sha256.txt"
          )
          for file in "${expected[@]}"; do
            test -f "release/$file" || {
              echo "Missing release asset: $file" >&2
              find downloaded-artifacts -type f -print >&2
              exit 1
            }
          done
          actual_count="$(find release -maxdepth 1 -type f | wc -l | tr -d ' ')"
          [[ "$actual_count" == "12" ]] || {
            echo "Expected 12 release assets, found $actual_count" >&2
            exit 1
          }

      - name: Create or update v0.25 release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${APP_VERSION}"
          title="FrameJoin Studio ${APP_VERSION}"
          if gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$tag" release/* --clobber --repo "$GH_REPO"
            gh release edit "$tag" --title "$title" --target "$TARGET_SHA" --repo "$GH_REPO"
          else
            gh release create "$tag" release/* \
              --target "$TARGET_SHA" \
              --title "$title" \
              --generate-notes \
              --repo "$GH_REPO"
          fi
