name: Build Installers

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: framejoin-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_VERSION: "0.21"

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller pillow

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Invoke-WebRequest $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip ffmpeg-package -Force
          $bin = Get-ChildItem ffmpeg-package -Directory -Recurse | Where-Object { Test-Path (Join-Path $_.FullName "ffmpeg.exe") } | Select-Object -First 1
          if (-not $bin) { throw "FFmpeg bin directory not found" }
          New-Item -ItemType Directory -Force tools | Out-Null
          Copy-Item "$($bin.FullName)\*" tools -Recurse -Force
          if (-not (Test-Path tools\ffmpeg.exe) -or -not (Test-Path tools\ffprobe.exe)) { throw "FFmpeg tools were not copied" }

      - name: Verify branding and compile Python
        shell: pwsh
        run: |
          python scripts/materialize_branding.py
          python -m compileall -q framejoin tests scripts main.py sitecustomize.py

      - name: Run core tests
        shell: pwsh
        env:
          FRAMEJOIN_FFMPEG: ${{ github.workspace }}\tools\ffmpeg.exe
          FRAMEJOIN_FFPROBE: ${{ github.workspace }}\tools\ffprobe.exe
        run: python -m unittest discover -s tests -p "test_core.py" -v

      - name: Run Windows GUI smoke tests
        shell: pwsh
        env:
          FRAMEJOIN_FFMPEG: ${{ github.workspace }}\tools\ffmpeg.exe
          FRAMEJOIN_FFPROBE: ${{ github.workspace }}\tools\ffprobe.exe
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -p "test_ui_smoke.py" -v

      - name: Build application icon
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: python scripts/build_icon.py

      - name: Build Windows application
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --name FrameJoinStudio --icon framejoin/assets/app.ico --add-data "framejoin/assets;framejoin/assets" main.py
          if (-not (Test-Path dist\FrameJoinStudio\FrameJoinStudio.exe)) { throw "PyInstaller output is missing" }

      - name: Assemble Windows portable ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\FrameJoinStudio\tools | Out-Null
          Copy-Item tools\* dist\FrameJoinStudio\tools -Recurse -Force
          Copy-Item README.md,BUILD.md,THIRD_PARTY_NOTICES.txt dist\FrameJoinStudio -Force
          $zip = "FrameJoin_Studio_v$env:APP_VERSION`_Windows_x64_Portable.zip"
          Compress-Archive dist\FrameJoinStudio\* $zip -CompressionLevel Optimal -Force
          (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()+"  "+$zip | Set-Content "$zip.sha256.txt" -Encoding ASCII

      - name: Build bilingual Windows EXE installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install innosetup --no-progress -y --limit-output
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "Inno Setup compiler not found" }

          $languageUrl = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/ChineseSimplified.isl"
          $languageFile = Join-Path $env:GITHUB_WORKSPACE "installer\windows\ChineseSimplified.isl"
          Invoke-WebRequest $languageUrl -OutFile $languageFile
          if (-not (Test-Path $languageFile)) { throw "Simplified Chinese language file was not downloaded" }
          if ((Get-Item $languageFile).Length -lt 10000) { throw "Simplified Chinese language file is unexpectedly small" }

          $env:APP_SOURCE_DIR = (Resolve-Path dist\FrameJoinStudio).Path
          $env:APP_OUTPUT_DIR = (Resolve-Path dist).Path
          $env:APP_ICON_FILE = (Resolve-Path framejoin\assets\app.ico).Path
          $env:APP_CHINESE_LANGUAGE_FILE = (Resolve-Path $languageFile).Path
          & $iscc installer\windows\FrameJoinStudio.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed with exit code $LASTEXITCODE" }
          $setup = "dist\FrameJoin_Studio_v$env:APP_VERSION`_Windows_x64_Setup.exe"
          if (-not (Test-Path $setup)) { throw "Windows installer was not created" }
          (Get-FileHash $setup -Algorithm SHA256).Hash.ToLower()+"  "+(Split-Path $setup -Leaf) | Set-Content "$setup.sha256.txt" -Encoding ASCII

      - uses: actions/upload-artifact@v4
        with:
          name: FrameJoin-Studio-${{ env.APP_VERSION }}-Windows-x64
          path: |
            FrameJoin_Studio_v${{ env.APP_VERSION }}_Windows_x64_Portable.zip
            FrameJoin_Studio_v${{ env.APP_VERSION }}_Windows_x64_Portable.zip.sha256.txt
            dist/FrameJoin_Studio_v${{ env.APP_VERSION }}_Windows_x64_Setup.exe
            dist/FrameJoin_Studio_v${{ env.APP_VERSION }}_Windows_x64_Setup.exe.sha256.txt
          if-no-files-found: error

  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: Intel
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 75
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      FRAMEJOIN_SKIP_UI_SMOKE: "1"
      QT_QPA_PLATFORM: minimal
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install macOS dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller pillow
          brew install ffmpeg dylibbundler

      - name: Verify branding and compile Python
        run: |
          set -euo pipefail
          python scripts/materialize_branding.py
          python -m compileall -q framejoin tests scripts main.py sitecustomize.py

      - name: Run macOS core tests
        env:
          FRAMEJOIN_FFMPEG: ${{ runner.temp }}/framejoin-ffmpeg
          FRAMEJOIN_FFPROBE: ${{ runner.temp }}/framejoin-ffprobe
        run: |
          set -euo pipefail
          ln -sf "$(brew --prefix ffmpeg)/bin/ffmpeg" "$FRAMEJOIN_FFMPEG"
          ln -sf "$(brew --prefix ffmpeg)/bin/ffprobe" "$FRAMEJOIN_FFPROBE"
          python -m unittest discover -s tests -p "test_core.py" -v

      - name: Build macOS application icon
        run: |
          set -euo pipefail
          python scripts/build_icon.py
          rm -rf framejoin/assets/app.iconset framejoin/assets/app.icns
          mkdir framejoin/assets/app.iconset
          for size in 16 32 128 256 512; do
            sips -z "$size" "$size" framejoin/assets/logo.png --out "framejoin/assets/app.iconset/icon_${size}x${size}.png" >/dev/null
            double=$((size*2))
            sips -z "$double" "$double" framejoin/assets/logo.png --out "framejoin/assets/app.iconset/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns framejoin/assets/app.iconset -o framejoin/assets/app.icns

      - name: Build macOS application
        run: |
          set -euo pipefail
          pyinstaller --noconfirm --clean --windowed --name FrameJoinStudio --osx-bundle-identifier com.framejoinstudio.app --icon framejoin/assets/app.icns --add-data "framejoin/assets:framejoin/assets" main.py
          test -d dist/FrameJoinStudio.app

      - name: Bundle FFmpeg
        run: |
          set -euo pipefail
          app="dist/FrameJoinStudio.app"
          mkdir -p "$app/Contents/MacOS/tools" "$app/Contents/Frameworks"
          cp "$(brew --prefix ffmpeg)/bin/ffmpeg" "$app/Contents/MacOS/tools/ffmpeg"
          cp "$(brew --prefix ffmpeg)/bin/ffprobe" "$app/Contents/MacOS/tools/ffprobe"
          dylibbundler -od -b -x "$app/Contents/MacOS/tools/ffmpeg" -d "$app/Contents/Frameworks" -p @executable_path/../../Frameworks/
          dylibbundler -od -b -x "$app/Contents/MacOS/tools/ffprobe" -d "$app/Contents/Frameworks" -p @executable_path/../../Frameworks/
          codesign --force --deep --sign - "$app"

      - name: Create macOS DMG and PKG
        run: |
          set -euo pipefail
          app="dist/FrameJoinStudio.app"
          rm -rf dmg-root
          mkdir dmg-root
          cp -R "$app" dmg-root/
          ln -s /Applications dmg-root/Applications
          cp README.md THIRD_PARTY_NOTICES.txt dmg-root/
          dmg="FrameJoin_Studio_v${APP_VERSION}_macOS_${{ matrix.arch }}.dmg"
          hdiutil create -volname "FrameJoin Studio ${APP_VERSION}" -srcfolder dmg-root -ov -format UDZO "$dmg"
          pkg="FrameJoin_Studio_v${APP_VERSION}_macOS_${{ matrix.arch }}.pkg"
          pkgbuild --component "$app" --install-location /Applications --identifier com.framejoinstudio.app --version "$APP_VERSION" component.pkg
          productbuild --package component.pkg "$pkg"
          shasum -a 256 "$dmg" > "$dmg.sha256.txt"
          shasum -a 256 "$pkg" > "$pkg.sha256.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: FrameJoin-Studio-${{ env.APP_VERSION }}-macOS-${{ matrix.arch }}
          path: |
            FrameJoin_Studio_v${{ env.APP_VERSION }}_macOS_${{ matrix.arch }}.dmg
            FrameJoin_Studio_v${{ env.APP_VERSION }}_macOS_${{ matrix.arch }}.dmg.sha256.txt
            FrameJoin_Studio_v${{ env.APP_VERSION }}_macOS_${{ matrix.arch }}.pkg
            FrameJoin_Studio_v${{ env.APP_VERSION }}_macOS_${{ matrix.arch }}.pkg.sha256.txt
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" release/* --title "FrameJoin Studio ${APP_VERSION}" --generate-notes
